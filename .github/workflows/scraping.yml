name: Scraping Pipeline

on:
  schedule:
    # Cada 4 horas
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Source slug or all'
        required: false
        default: 'all'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        working-directory: scrapers
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scrapers
        working-directory: scrapers
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
        run: |
          python main.py --source "${{ github.event.inputs.source || 'all' }}"
